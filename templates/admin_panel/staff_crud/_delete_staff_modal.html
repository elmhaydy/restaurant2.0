<div class="modal" id="deleteStaffModal{{ employee.id }}">
    <div class="modal-card" style="max-width: 480px;">
        <div class="modal-header">
            <h2>Confirmer la suppression</h2>
            <button type="button" class="close-btn" onclick="closeModal('deleteStaffModal{{ employee.id }}')">×</button>
        </div>

        <form method="POST" action="{% url 'admin_panel:staff_delete' employee.id %}">
            {% csrf_token %}

            <div class="modal-body">
                <p>Voulez-vous vraiment désactiver cet employé ?</p>
                <h3 style="color:#8B4513;">
                    {{ employee.get_full_name|default:employee.username }}
                </h3>
                <p style="color:#888;">Il ne pourra plus se connecter.</p>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn-cancel" onclick="closeModal('deleteStaffModal{{ employee.id }}')">Annuler</button>
                <button type="submit" class="btn-confirm-delete">Désactiver</button>
            </div>
        </form>
    </div>
</div>
