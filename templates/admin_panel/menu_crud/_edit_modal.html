<div class="modal" id="editModal{{ dish.id }}">
    <div class="modal-card">
        <div class="modal-header">
            <h2 style="margin:0; font-family:'Playfair Display', serif;">
                Modifier {{ dish.name }}
            </h2>

            <button type="button" class="close-btn" onclick="closeModal('editModal{{ dish.id }}')">
                ×
            </button>
        </div>

        <form method="post" action="{% url 'admin_panel:dish_update' dish.id %}" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="modal-body">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Nom du plat</label>
                        <input type="text" name="name" value="{{ dish.name }}" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label>Slug</label>
                        <input type="text" name="slug" value="{{ dish.slug }}" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label>Catégorie</label>
                        <select name="category" class="form-control" required>
                            {% for category in categories %}
                                <option value="{{ category.id }}" {% if dish.category.id == category.id %}selected{% endif %}>
                                    {{ category.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Prix de vente</label>
                        <input type="number" step="0.01" name="price" value="{{ dish.price }}" class="form-control" required>
                    </div>

                    <div class="form-group full">
                        <label>Description</label>
                        <textarea name="description" class="form-control" rows="4">{{ dish.description }}</textarea>
                    </div>

                    <div class="form-group full">
                        <label>Image</label>
                        {% if dish.image %}
                            <div style="margin-bottom:10px;">
                                <img src="{{ dish.image.url }}" style="width:90px;height:90px;object-fit:cover;border-radius:10px;">
                            </div>
                        {% endif %}
                        <input type="file" name="image" class="form-control">
                    </div>

                    <div class="form-group">
                        <label>
                            <input type="checkbox" name="is_active" {% if dish.is_active %}checked{% endif %}>
                            Actif
                        </label>
                    </div>

                    <div class="form-group">
                        <label>
                            <input type="checkbox" name="is_popular" {% if dish.is_popular %}checked{% endif %}>
                            Populaire
                        </label>
                    </div>

                    <div class="form-group">
                        <label>
                            <input type="checkbox" name="manual_available" {% if dish.manual_available %}checked{% endif %}>
                            Disponible
                        </label>
                    </div>
                </div>

                <hr style="margin:25px 0;">

                <h3 style="font-family:'Playfair Display', serif; margin-bottom:15px;">
                    Composition du plat
                </h3>

                <div id="composition-edit-{{ dish.id }}">
                    {% for comp in dish.composition.all %}
                        <div class="composition-row">
                            <select name="ingredient_id[]" class="form-control" required>
                                <option value="">Choisir un ingrédient</option>
                                {% for ingredient in ingredients %}
                                    <option value="{{ ingredient.id }}" {% if comp.ingredient.id == ingredient.id %}selected{% endif %}>
                                        {{ ingredient.name }} — Stock: {{ ingredient.quantity }} {{ ingredient.unit }}
                                    </option>
                                {% endfor %}
                            </select>

                            <input type="number" step="0.01" name="quantity[]" class="form-control" value="{{ comp.quantity }}" required>

                            <select name="unit[]" class="form-control" required>
                                <option value="g" {% if comp.unit == "g" %}selected{% endif %}>g</option>
                                <option value="kg" {% if comp.unit == "kg" %}selected{% endif %}>kg</option>
                                <option value="ml" {% if comp.unit == "ml" %}selected{% endif %}>ml</option>
                                <option value="l" {% if comp.unit == "l" %}selected{% endif %}>l</option>
                                <option value="piece" {% if comp.unit == "piece" %}selected{% endif %}>pièce</option>
                            </select>

                            <button type="button" class="action-btn btn-delete" onclick="removeCompositionRow(this)">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    {% empty %}
                        <div class="composition-row">
                            <select name="ingredient_id[]" class="form-control" required>
                                <option value="">Choisir un ingrédient</option>
                                {% for ingredient in ingredients %}
                                    <option value="{{ ingredient.id }}">
                                        {{ ingredient.name }} — Stock: {{ ingredient.quantity }} {{ ingredient.unit }}
                                    </option>
                                {% endfor %}
                            </select>

                            <input type="number" step="0.01" name="quantity[]" class="form-control" placeholder="Qté" required>

                            <select name="unit[]" class="form-control" required>
                                <option value="g">g</option>
                                <option value="kg">kg</option>
                                <option value="ml">ml</option>
                                <option value="l">l</option>
                                <option value="piece">pièce</option>
                            </select>

                            <button type="button" class="action-btn btn-delete" onclick="removeCompositionRow(this)">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    {% endfor %}
                </div>

                <button type="button" class="action-btn btn-view" style="margin-top:10px;" onclick="addCompositionRow('composition-edit-{{ dish.id }}')">
                    <i class="fas fa-plus"></i> Ajouter un ingrédient
                </button>

                <div class="composition-summary">
                    Coût matière estimé : {{ dish.material_cost|floatformat:2 }} MAD<br>
                    Marge brute : {{ dish.gross_margin|floatformat:2 }} MAD
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="action-btn btn-delete" onclick="closeModal('editModal{{ dish.id }}')">
                    Annuler
                </button>

                <button type="submit" class="action-btn btn-success">
                    <i class="fas fa-save"></i> Modifier
                </button>
            </div>
        </form>
    </div>
</div>
